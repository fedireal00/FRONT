name: Build FRONT VST3

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            cmake_args: -A x64
          - os: macos-latest
            name: macOS
            cmake_args: >-
              -G Xcode
              -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY="-"
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone JUCE
        run: git clone --depth 1 https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          for p in build/FRONT_artefacts/Release/VST3/*.vst3 \
                   build/FRONT_artefacts/Release/AU/*.component; do
            if [ -e "$p" ]; then
              echo "Signing $p"
              codesign --force --deep -s - "$p"
              codesign -dv "$p" || true
            fi
          done

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: FRONT-VST3-Windows
          path: build/FRONT_artefacts/Release/VST3/

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: FRONT-VST3-AU-macOS
          path: |
            build/FRONT_artefacts/Release/VST3/
            build/FRONT_artefacts/Release/AU/
